<div class="container my-4">

  <!-- MAP CARD -->
  <div class="card mb-4 shadow-sm">
    <div class="card-body p-0" style="height: 300px;">
      <google-map
        [center]="center"
        [zoom]="zoom"
        [options]="mapOptions"
        (mapClick)="mapClicked($event)"
        height="100%"
        width="100%">
        <map-marker *ngFor="let pin of memoryPins"
                    [position]="{lat: pin.lat, lng: pin.lng}"
                    (mapClick)="markerClicked(pin)">
        </map-marker>
      </google-map>
    </div>
    <div class="card-body text-center">
      <h5 class="card-title text-pink mb-1">Our Map Memories 💕</h5>
      <p class="card-text text-muted mb-0">Little places that mean everything</p>
    </div>
  </div>

  <!-- MEMORY LIST -->
<div class="list-group mb-4">
  <div *ngFor="let pin of memoryPins" class="d-flex justify-content-between align-items-center list-group-item list-group-item-action"
       [class.active]="selectedMarker === pin"
       (click)="listClicked(pin)">
    
    <div>
      <div class="fw-bold">{{ pin.title }}</div>
      <small class="text-muted">{{ pin.text }}</small>
    </div>
    
    <div class="d-flex gap-2">
      <span>📍</span>
      <button class="btn btn-sm btn-danger" (click)="deletePin(pin); $event.stopPropagation()">Delete</button>
    </div>

  </div>
</div>


  <!-- MEMORY DETAIL MODAL -->
<div class="modal fade show" tabindex="-1" [ngClass]="{'d-block': selectedMarker}" (click)="selectedMarker = null">
  <div class="modal-dialog modal-dialog-centered" (click)="$event.stopPropagation()">
    <div class="modal-content">
      <div class="modal-header bg-pink text-white">
        <h5 class="modal-title">{{ selectedMarker?.title }}</h5>
        <button type="button" class="btn-close btn-close-white" (click)="selectedMarker = null"></button>
      </div>
      <div class="modal-body">
        <p>{{ selectedMarker?.text }}</p>
        <div class="d-flex flex-wrap gap-2">
          <img *ngFor="let img of selectedMarker?.images"
               [src]="img"
               (click)="openImageViewer(img)"
               class="img-thumbnail" style="width:100px;height:100px;object-fit:cover;cursor:pointer;">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-pink" (click)="selectedMarker = null">Close</button>
      </div>
    </div>
  </div>
</div>


  <!-- ADD PIN MODAL -->
  <div class="modal fade show" tabindex="-1" [ngClass]="{'d-block': adding}" (click)="adding = false">
    <div class="modal-dialog modal-dialog-centered modal-lg" (click)="$event.stopPropagation()">
      <div class="modal-content">
        <div class="modal-header bg-pink text-white">
          <h5 class="modal-title">Add a Memory 💕</h5>
          <button type="button" class="btn-close btn-close-white" (click)="adding = false"></button>
        </div>
        <div class="modal-body">
          <input type="text" placeholder="Title" [(ngModel)]="newPin.title" class="form-control mb-2">
          <textarea placeholder="Memory text" [(ngModel)]="newPin.text" class="form-control mb-2" rows="3"></textarea>
          <input type="file" (change)="addImageFromPhone($event)" multiple class="form-control mb-2">
          <div class="d-flex flex-wrap gap-2">
            <img *ngFor="let img of newPin.images"
                 [src]="typeof img === 'string' ? img : 'data:image/jpeg;base64,' + img.base64Data"
                 (click)="openImageViewer(img)"
                 class="img-thumbnail" style="width:100px;height:100px;object-fit:cover;cursor:pointer;">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-pink" (click)="savePin()">Save</button>
          <button class="btn btn-outline-pink" (click)="adding = false">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- IMAGE VIEWER MODAL -->
  <div class="modal fade show" tabindex="-1" [ngClass]="{'d-block': viewingImage}" (click)="closeImageViewer()">
    <div class="modal-dialog modal-dialog-centered modal-lg" (click)="$event.stopPropagation()">
      <div class="modal-content p-2 text-center">
        <button type="button" class="btn-close position-absolute top-0 end-0 m-2" (click)="closeImageViewer()"></button>
        <img *ngIf="viewingImage" [src]="getImageSrc(viewingImage)"
             class="img-fluid mx-auto"
             style="max-width:80vw; max-height:80vh; object-fit:contain;">
      </div>
    </div>
  </div>

</div>
