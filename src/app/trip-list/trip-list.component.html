<div class="trip-list-container">
  <!-- Trip List -->
  <div class="trip-list" *ngIf="!selectedTrip">
    <h2><i class="fas fa-route"></i> Our Trips</h2>
    <ul>
      <li *ngFor="let trip of trips" (click)="selectTrip(trip)">
        <i class="fas fa-map-marker-alt"></i> {{ trip.title }}
      </li>
    </ul>
  </div>

  <!-- Map Detail -->
  <div class="trip-detail" *ngIf="selectedTrip">
    <button class="back-button" (click)="closeTrip()">
      <i class="fas fa-arrow-left"></i> Back to trips
    </button>
    <h3><i class="fas fa-car-side"></i> {{ selectedTrip.title }}</h3>
    <app-map [trip]="selectedTrip"></app-map>
  </div>
</div>
