<div class="container my-4 daily-words-board">

  <h1 class="board-title text-center mb-4">📚 Words to Learn</h1>

  <!-- Input Card -->
  <div class="card mb-4 shadow-sm p-3">
    <input type="text" placeholder="Word" [(ngModel)]="newWord" class="form-control mb-2">
    <input type="text" placeholder="Meaning (optional)" [(ngModel)]="newMeaning" class="form-control mb-2">
    <button class="btn btn-primary w-100" (click)="addWord()">Send Word</button>
  </div>

  <!-- Feed -->
  <div class="feed">
    <div *ngFor="let e of feed" 
         class="card mb-2 shadow-sm word-card"
         [ngClass]="{'light-blue': e.receiverId===1, 'light-pink': e.receiverId===2}">

      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <strong>{{ e.word }}</strong> 
          <span *ngIf="e.meaning"> - {{ e.meaning }}</span>
          <small class="text-muted d-block">Sent by {{ e.senderId===1 ? 'Andrej' : 'Laila' }}</small>
        </div>
        <div>
          <input type="checkbox" [checked]="e.learned" 
                 (change)="toggleLearned(e)"
                 [disabled]="e.receiverId !== currentUserId">
        </div>
      </div>
    </div>
  </div>
</div>
