<google-map
  [height]="'500px'"
  [width]="'100%'"
  [center]="center"
  [zoom]="zoom"
  [options]="mapOptions">

  <!-- Route polyline -->
  <map-polyline
    [path]="polylinePath"
    [options]="{ strokeColor: '#0000FF', strokeWeight: 4 }">
  </map-polyline>

  <!-- Car marker -->
  <map-marker
    [position]="markerPosition"
    [icon]="markerIcon">
  </map-marker>

</google-map>
